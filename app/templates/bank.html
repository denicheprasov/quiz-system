{% extends "base.html" %}

{% block title %}Банк заданий{% endblock %}

{% block content %}
<style>
.task-card { border: 1px solid var(--bs-border-color); border-radius: 10px; padding: 16px; margin-bottom: 12px; background: var(--bs-card-bg); }
.task-card:hover { border-color: var(--bs-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
</style>
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient d-flex justify-content-between align-items-center">
                <h4 class="mb-0">📚 Банк заданий</h4>
                <div>
                    <a href="/import" class="btn btn-light btn-sm">
                        <i class="bi bi-cloud-upload"></i> Импорт
                    </a>
                    <a href="/variant-builder" class="btn btn-light btn-sm">
                        <i class="bi bi-plus-circle"></i> Собрать вариант
                    </a>
                    <button class="btn btn-outline-light btn-sm" onclick="deleteAllTasks()">
                        <i class="bi bi-trash"></i> Очистить
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Фильтры -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Номер задания в КИМ</label>
                        <select class="form-select" id="filterNumber">
                            <option value="">Все номера</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                             <option value="19">Теория игр</option>
                             <option value="22">22</option>
                            <option value="23">23</option>
                            <option value="24">24</option>
                            <option value="25">25</option>
                            <option value="26">26</option>
                            <option value="27">27</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Сложность</label>
                        <select class="form-select" id="filterDifficulty">
                            <option value="">Все</option>
                            <option value="easy">Изи</option>
                            <option value="medium">База</option>
                            <option value="hard">Хард</option>
                            <option value="impossible">💀 Легче умереть</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="applyFilters()">
                            <i class="bi bi-search"></i> Применить
                        </button>
                    </div>
                </div>

                <!-- Статистика -->
                <div class="row mb-3">
                    <div class="col-md-12">
                        <div id="stats" class="d-flex gap-3 flex-wrap">
                            <span class="badge bg-primary">Всего: <span id="totalCount">0</span></span>
                            <span class="badge bg-info">Номера в банке: <span id="numberCount">0</span></span>
                        </div>
                    </div>
                </div>
                
                <div id="tasksList">
                    <div class="text-center">
                        <div class="spinner-border" role="status"></div>
                        <p>Загрузка заданий...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для просмотра -->
<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">👁️ Просмотр задания</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewContent">
                <div class="text-center"><div class="spinner-border" role="status"></div></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">✏️ Редактировать задание</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editTaskId">
                <div class="mb-3">
                    <label class="form-label">Текст задания</label>
                    <textarea class="form-control" id="editText" rows="8"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Правильный ответ</label>
                    <input type="text" class="form-control" id="editAnswer">
                </div>
                <div class="mb-3">
                    <label class="form-label">URL изображения</label>
                    <input type="text" class="form-control" id="editImageUrl">
                </div>
                <div class="mb-3">
                    <label class="form-label">Сложность</label>
                    <select class="form-select" id="editDifficulty">
                        <option value="">Без уровня</option>
                        <option value="easy">Изи</option>
                        <option value="medium">База</option>
                        <option value="hard">Хард</option>
                        <option value="impossible">💀 Легче умереть</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Количество полей для ответа</label>
                    <input type="number" class="form-control" id="editAnswerCount" min="1" max="10" value="1">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-success" onclick="saveEdit()">💾 Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="variantModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📋 Добавить в вариант</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="variantTaskId">
                <div id="variantList" class="list-group"></div>
                <hr>
                <div class="input-group">
                    <input type="text" class="form-control" id="newVariantName" placeholder="Новый вариант">
                    <button class="btn btn-success" onclick="createAndAdd()">➕ Создать</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteProgressModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <div class="mb-3"><div class="spinner-border text-danger" role="status"></div></div>
                <h6>🗑️ Удаление заданий...</h6>
                <div class="d-flex justify-content-between mb-1 small">
                    <span>Прогресс</span>
                    <span id="deleteProgressText">0%</span>
                </div>
                <div class="progress" style="height:10px">
                    <div id="deleteProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-danger" style="width:0%"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function loadTasks(filters) {
    var container = document.getElementById('tasksList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    var url = '/bank/tasks?limit=9999';
    if (filters) {
        if (filters.task_number) url += '&task_number=' + filters.task_number;
        if (filters.difficulty) url += '&difficulty=' + filters.difficulty;
    }
    
    fetch(url, {credentials: 'include'})
    .then(function(response) {
        return response.json();
    })
    .then(function(tasks) {
        var numbers = new Set(tasks.map(function(t) { return t.task_number; }));
        
        document.getElementById('totalCount').textContent = tasks.length;
        document.getElementById('numberCount').textContent = numbers.size;
        
        if (tasks.length === 0) {
            container.innerHTML = `
                <div class="alert alert-info">
                    📭 Банк заданий пуст. <a href="/import">Импортируйте</a> задания.
                </div>
            `;
            return;
        }
        
        // Группировка по номерам
        var grouped = {};
        tasks.forEach(function(task) {
            var num = task.task_number;
            if (!grouped[num]) grouped[num] = [];
            grouped[num].push(task);
        });
        
        var html = '<div class="accordion" id="tasksAccordion">';
        var sortedNumbers = Object.keys(grouped).sort(function(a, b) { return parseInt(a) - parseInt(b); });
        
        sortedNumbers.forEach(function(num) {
            var tasksForNumber = grouped[num];
            var count = tasksForNumber.length;

            html += '<div class="accordion-item">';
            html += '<h2 class="accordion-header">';
            html += '<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse' + num + '">';
            var numLabel = num == 19 ? 'Теория игр' : 'Задание №' + num;
            html += numLabel + ' (' + count + ' заданий)';
            html += '</button>';
            html += '</h2>';
            html += '<div id="collapse' + num + '" class="accordion-collapse collapse" data-bs-parent="#tasksAccordion">';
            html += '<div class="accordion-body">';

            tasksForNumber.forEach(function(task) {

                html += '<div class="task-card" data-task-id="' + task.id + '" data-task-number="' + num + '">';
                html += '<div class="d-flex justify-content-between align-items-start mb-2">';
                html += '<span class="fw-bold">#' + task.order_in_file + ' (ID: ' + task.id + ')</span>';
                html += '<div class="d-flex gap-1 align-items-center">';
                if (task.difficulty && task.difficulty !== 'base') {
                    var diffMap = {easy:'Изи',medium:'База',hard:'Хард',impossible:'💀 Легче умереть'};
                    var diffColor = {easy:'success',medium:'warning text-dark',hard:'danger',impossible:'dark'};
                    html += '<span class="diff-badge badge bg-' + diffColor[task.difficulty] + '">' + diffMap[task.difficulty] + '</span>';
                }
                html += '</div>';
                html += '</div>';
                html += '<p class="mb-2">' + task.text.replace(/\n/g, '<br>') + '</p>';
                if (task.file_url) {
                    task.file_url.split('\n').forEach(function(url) {
                        html += '<p class="mb-1"><a href="' + url + '" class="btn btn-outline-primary btn-sm" target="_blank"><i class="bi bi-download"></i> Скачать файл</a></p>';
                    });
                }
                html += '<p class="mb-2"><strong>Ответ:</strong> ' + task.correct_answer + '</p>';
                html += '<div class="d-flex gap-1 mt-2">';
                html += '<button class="btn btn-warning btn-sm" onclick="editTask(' + task.id + ')">✏️</button>';
                html += '<button class="btn btn-secondary btn-sm" onclick="addToVariant(' + task.id + ')">📋</button>';
                html += '<button class="btn btn-danger btn-sm" onclick="deleteTask(' + task.id + ')">🗑️</button>';
                html += '</div>';
                html += '</div>';
            });
            html += '</div></div></div>';
        });
        
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки заданий</div>';
        console.error('Error:', error);
    });
}

function applyFilters() {
    var filters = {};
    var number = document.getElementById('filterNumber').value;
    var difficulty = document.getElementById('filterDifficulty').value;
    
    if (number) filters.task_number = parseInt(number);
    if (difficulty) filters.difficulty = difficulty;
    
    loadTasks(filters);
}

function viewTask(taskId) {
    var modal = new bootstrap.Modal(document.getElementById('viewModal'));
    modal.show();
    
    var container = document.getElementById('viewContent');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    fetch('/bank/tasks/' + taskId, {credentials: 'include'})
    .then(function(response) {
        return response.json();
    })
    .then(function(task) {
        var html = '<div class="card">';
        html += '<div class="card-body">';
        html += '<h6>' + (task.task_number == 19 ? 'Теория игр' : 'Задание №' + task.task_number) + ' (ID: ' + task.id + ')</h6>';
        html += '<hr>';
        html += '<p><strong>Текст:</strong></p>';
            html += '<div class="p-2 bg-light">' + task.text.replace(/\n/g, '<br>') + '</div>';
        if (task.file_url) {
            task.file_url.split('\n').forEach(function(url) {
                html += '<p class="mt-1"><a href="' + url + '" class="btn btn-outline-primary btn-sm" target="_blank"><i class="bi bi-download"></i> Скачать файл</a></p>';
            });
        }
        if (task.table_data) {
            html += '<p class="mt-3"><strong>Таблица:</strong></p>';
            html += '<div class="p-2 bg-light"><pre>' + task.table_data + '</pre></div>';
        }
        html += '<p class="mt-3"><strong>Правильный ответ:</strong> ' + task.correct_answer + '</p>';
        html += '</div></div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки</div>';
    });
}

function deleteTask(taskId) {
    if (!confirm('Удалить задание?')) return;

    fetch('/bank/tasks/' + taskId, {
        method: 'DELETE',
        credentials: 'include'
    })
    .then(function(response) {
        return response.json();
    })
    .then(function() {
        var card = document.querySelector('.task-card[data-task-id="' + taskId + '"]');
        if (card) {
            var accordionItem = card.closest('.accordion-item');
            var accordionBody = card.closest('.accordion-body');
            card.remove();
            updateStats();

            if (accordionBody && accordionBody.querySelectorAll('.task-card').length === 0 && accordionItem) {
                accordionItem.remove();
            }
        }
    })
    .catch(function(error) {
        alert('Ошибка при удалении');
        console.error('Error:', error);
    });
}

function updateStats() {
    var cards = document.querySelectorAll('#tasksAccordion .task-card');
    var total = cards.length;
    var numbers = new Set();

    cards.forEach(function(c) {
        var num = c.getAttribute('data-task-number');
        if (num) numbers.add(num);
    });

    document.getElementById('totalCount').textContent = total;
    document.getElementById('numberCount').textContent = numbers.size;

    document.querySelectorAll('#tasksAccordion .accordion-item').forEach(function(item) {
        var itemCards = item.querySelectorAll('.task-card');
        var totalInItem = itemCards.length;
        var btn = item.querySelector('.accordion-button');
        var num = item.id ? item.id.replace('accordion-item-', '') : '';
        if (btn) {
            var numLabel = num == 19 ? 'Теория игр' : 'Задание №' + num;
            btn.textContent = numLabel + ' (' + totalInItem + ' заданий)';
        }
    });
}

function editTask(taskId) {
    fetch('/bank/tasks/' + taskId, {credentials: 'include'})
    .then(function(r) { return r.json(); })
    .then(function(task) {
        document.getElementById('editTaskId').value = task.id;
        document.getElementById('editText').value = task.text;
        document.getElementById('editAnswer').value = task.correct_answer || '';
        document.getElementById('editImageUrl').value = task.image_url || '';
        document.getElementById('editDifficulty').value = task.difficulty || '';
        document.getElementById('editAnswerCount').value = task.answer_count || 1;
        new bootstrap.Modal(document.getElementById('editModal')).show();
    })
    .catch(function() { alert('Ошибка загрузки задания'); });
}

function saveEdit() {
    var id = document.getElementById('editTaskId').value;
    var data = {
        text: document.getElementById('editText').value,
        correct_answer: document.getElementById('editAnswer').value,
        image_url: document.getElementById('editImageUrl').value,
        difficulty: document.getElementById('editDifficulty').value,
        answer_count: parseInt(document.getElementById('editAnswerCount').value) || 1
    };

    fetch('/bank/tasks/' + id, {
        method: 'PUT',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function(task) {
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();

        var card = document.querySelector('.task-card[data-task-id="' + id + '"]');
        if (card) {
            var textP = card.querySelector('p:first-of-type');
            if (textP) textP.innerHTML = (task.text || '').replace(/\n/g, '<br>');

            var answerP = Array.from(card.querySelectorAll('p')).find(function(p) {
                return p.innerHTML.startsWith('<strong>Ответ:</strong>');
            });
            if (answerP) answerP.innerHTML = '<strong>Ответ:</strong> ' + (task.correct_answer || '');

            var img = card.querySelector('img');
            if (task.image_url) {
                if (img) {
                    img.src = task.image_url;
                } else {
                    var newImg = document.createElement('img');
                    newImg.src = task.image_url;
                    newImg.className = 'img-fluid rounded question-image mb-2';
                    newImg.style.cssText = 'display:block;margin:8px auto';
                    textP.parentNode.insertBefore(newImg, textP.nextSibling);
                }
            } else if (img) {
                img.remove();
            }

            var diffBadge = card.querySelector('.diff-badge');
            if (task.difficulty && task.difficulty !== 'base') {
                var diffMap = {easy:'Изи',medium:'База',hard:'Хард',impossible:'💀 Легче умереть'};
                var diffColor = {easy:'success',medium:'warning text-dark',hard:'danger',impossible:'dark'};
                var label = diffMap[task.difficulty] || task.difficulty;
                var color = diffColor[task.difficulty] || 'secondary';
                if (diffBadge) {
                    diffBadge.textContent = label;
                    diffBadge.className = 'diff-badge badge bg-' + color;
                } else {
                    var actionCell = card.querySelector('.action-cell');
                    var newBadge = document.createElement('span');
                    newBadge.className = 'diff-badge badge bg-' + color;
                    newBadge.textContent = label;
                    actionCell.parentNode.insertBefore(newBadge, actionCell);
                }
            } else if (diffBadge) {
                diffBadge.remove();
            }
        }
    })
    .catch(function() { alert('Ошибка сохранения'); });
}

function addToVariant(taskId) {
    document.getElementById('variantTaskId').value = taskId;
    var list = document.getElementById('variantList');
    list.innerHTML = '<div class="text-center"><div class="spinner-border spinner-border-sm"></div></div>';
    var modal = new bootstrap.Modal(document.getElementById('variantModal'));
    modal.show();

    fetch('/variants/', {credentials: 'include'})
    .then(function(r) { return r.json(); })
    .then(function(variants) {
        if (variants.length === 0) {
            list.innerHTML = '<div class="text-muted small">Нет вариантов. Создайте новый ниже.</div>';
            return;
        }
        list.innerHTML = '';
        variants.forEach(function(v) {
            var item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action';
            item.href = '#';
            item.innerHTML = v.title + ' <span class="badge bg-secondary">' + (v.variant_tasks ? v.variant_tasks.length : 0) + ' зад.</span>';
            item.onclick = function(e) {
                e.preventDefault();
                addTaskToVariant(v.id, taskId);
            };
            list.appendChild(item);
        });
    })
    .catch(function() { list.innerHTML = '<div class="text-danger small">Ошибка загрузки</div>'; });
}

function addTaskToVariant(variantId, taskId) {
    fetch('/variants/' + variantId + '/tasks/' + taskId, {
        method: 'POST',
        credentials: 'include'
    })
    .then(function(r) {
        if (r.ok) {
            bootstrap.Modal.getInstance(document.getElementById('variantModal')).hide();
            alert('✅ Задание добавлено в вариант');
        } else {
            return r.json().then(function(d) { throw new Error(d.detail); });
        }
    })
    .catch(function(e) { alert('❌ ' + e.message); });
}

function createAndAdd() {
    var name = document.getElementById('newVariantName').value;
    if (!name) return;
    var taskId = document.getElementById('variantTaskId').value;
    var formData = new FormData();
    formData.append('title', name);

    fetch('/variants/new', {
        method: 'POST',
        credentials: 'include',
        body: formData
    })
    .then(function(r) { return r.json(); })
    .then(function(v) { return addTaskToVariant(v.id, taskId); })
    .catch(function() { alert('Ошибка'); });
}

function deleteAllTasks() {
    var num = prompt('Введите номер задания для удаления (1-27)\nОставьте пустым, чтобы удалить все:');
    if (num === null) return;

    var baseUrl = '/bank/tasks?batch_size=50';
    var label = 'всех заданий';
    if (num.trim() !== '') {
        var n = parseInt(num);
        if (n < 1 || n > 27 || isNaN(n)) { alert('Номер должен быть от 1 до 27'); return; }
        if (!confirm('Удалить все задания №' + n + '?')) return;
        baseUrl += '&task_number=' + n;
        label = 'заданий №' + n;
    } else {
        if (!confirm('Удалить ВСЕ задания из банка? Это действие нельзя отменить.')) return;
        if (!confirm('Точно уверены?')) return;
    }

    var modal = new bootstrap.Modal(document.getElementById('deleteProgressModal'));
    modal.show();
    var bar = document.getElementById('deleteProgressBar');
    var text = document.getElementById('deleteProgressText');
    bar.style.width = '0%';
    text.textContent = '0%';

    var totalDeleted = 0;
    var totalTasks = 0;
    var maxTasks = 0;

    function deleteBatch() {
        fetch(baseUrl, {method: 'DELETE', credentials: 'include'})
        .then(function(r) { return r.json(); })
        .then(function(data) {
            totalDeleted += data.deleted || 0;
            if (maxTasks === 0) maxTasks = data.total || totalDeleted;
            totalTasks = maxTasks;
            var pct = totalTasks > 0 ? Math.round(totalDeleted / totalTasks * 100) : 100;
            if (pct > 100) pct = 100;
            bar.style.width = pct + '%';
            text.textContent = pct + '%';
            if (data.deleted > 0 && data.total > 0) {
                deleteBatch();
            } else {
                bar.classList.remove('progress-bar-animated');
                setTimeout(function() {
                    modal.hide();
                    loadTasks();
                }, 300);
            }
        })
        .catch(function(error) {
            alert('Ошибка при очистке');
            console.error('Error:', error);
            var el = document.getElementById('deleteProgressModal');
            if (el) { var m = bootstrap.Modal.getInstance(el); if (m) m.hide(); }
            loadTasks();
        });
    }

    deleteBatch();
}

document.addEventListener('DOMContentLoaded', function() {
    loadTasks();
});
</script>
{% endblock %}
