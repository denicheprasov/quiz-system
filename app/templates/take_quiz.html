{% extends "base.html" %}

{% block title %}Прохождение теста{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">📝 Прохождение теста</h4>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center">
                    <div class="spinner-border" role="status"></div>
                    <p>Загрузка теста...</p>
                </div>
                
                <div id="quizContent" style="display:none;">
                    <h3 id="quizTitle"></h3>
                    <p id="quizDescription" class="text-muted"></p>
                    <hr>
                    
                    <form id="quizForm">
                        <div id="questionsContainer"></div>
                        <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
                            📤 Отправить ответы
                        </button>
                    </form>
                </div>
                
                <div id="resultContainer" style="display:none;">
                    <div class="alert alert-success">
                        <h4>🎉 Тест завершен!</h4>
                        <p>Ваш результат: <strong id="scoreDisplay"></strong></p>
                        <p>Процент: <strong id="percentageDisplay"></strong>%</p>
                        <a href="/dashboard" class="btn btn-primary">Вернуться к списку</a>
                    </div>
                </div>
                
                <div id="errorContainer" style="display:none;">
                    <div class="alert alert-danger">
                        ❌ Ошибка загрузки теста
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var quizId = window.location.pathname.split('/').pop();

var quizData = null;

function loadQuiz() {
    fetch('/quizzes/' + quizId, {
        credentials: 'include'
    })
    .then(function(response) {
        if (!response.ok) {
            throw new Error('Тест не найден');
        }
        return response.json();
    })
    .then(function(quiz) {
        quizData = quiz;
        displayQuiz(quiz);
    })
    .catch(function(error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('errorContainer').style.display = 'block';
        console.error('Error:', error);
    });
}

function displayQuiz(quiz) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('quizContent').style.display = 'block';
    
    document.getElementById('quizTitle').textContent = quiz.title;
    document.getElementById('quizDescription').textContent = quiz.description || 'Описание отсутствует';
    
    var container = document.getElementById('questionsContainer');
    var html = '';
    
    // Сортируем вопросы по номеру
    quiz.questions.sort(function(a, b) {
        return a.number - b.number;
    });
    
    for (var i = 0; i < quiz.questions.length; i++) {
        var q = quiz.questions[i];
        
        html += '<div class="card mb-4">';
        html += '<div class="card-header bg-light">';
        html += '<h5>Задание ' + q.number + '</h5>';  // ← Убрали отображение баллов
        html += '</div>';
        html += '<div class="card-body">';
        
        // Текст задания
        html += '<p class="card-text">' + q.text + '</p>';
        if (q.image_url) {
            html += '<img src="' + q.image_url + '" class="img-fluid rounded mb-2" style="max-height:300px" alt="Изображение к заданию">';
        }
        
        // Картинка
        if (q.image_url) {
            html += '<div class="text-center mb-3">';
            html += '<img src="' + q.image_url + '" alt="Изображение к заданию" class="img-fluid" style="max-height: 300px;">';
            html += '</div>';
        }
        
        // Файл
        if (q.file_url) {
            html += '<div class="mb-3">';
            html += '<a href="' + q.file_url + '" target="_blank" class="btn btn-outline-primary btn-sm">';
            html += '<i class="bi bi-download"></i> Скачать файл';
            html += '</a>';
            html += '</div>';
        }
        
        // Поля для ответов (абсолютно пустые)
        html += '<div class="mt-3">';
        html += '<label class="form-label"><strong>Введите ответ(ы):</strong></label>';
        
        for (var j = 0; j < q.answer_count; j++) {
            html += '<div class="mb-2">';
            html += '<input type="text" class="form-control answer-field" ';
            html += 'id="answer_' + q.id + '_' + j + '" ';
            html += 'name="question_' + q.id + '[]" ';
            html += 'data-question-id="' + q.id + '" ';
            html += 'data-field-index="' + j + '">';
            html += '</div>';
        }
        
        html += '</div>';
        html += '</div>';
        html += '</div>';
    }
    
    container.innerHTML = html;
}

document.getElementById('quizForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var answers = {};
    var fields = document.querySelectorAll('.answer-field');
    var currentQuestion = null;
    var currentAnswers = [];
    
    for (var i = 0; i < fields.length; i++) {
        var field = fields[i];
        var qId = field.dataset.questionId;
        var value = field.value.trim();
        
        if (currentQuestion !== qId) {
            if (currentQuestion !== null) {
                answers[currentQuestion] = currentAnswers;
            }
            currentQuestion = qId;
            currentAnswers = [];
        }
        currentAnswers.push(value || '');
    }
    
    // Добавляем последний вопрос
    if (currentQuestion !== null) {
        answers[currentQuestion] = currentAnswers;
    }
    
    // Проверяем, что есть хотя бы один ответ
    var hasAnswers = false;
    for (var key in answers) {
        if (answers[key].some(function(v) { return v !== ''; })) {
            hasAnswers = true;
            break;
        }
    }
    
    if (!hasAnswers) {
        alert('Пожалуйста, ответьте хотя бы на один вопрос!');
        return;
    }
    
    var data = {
        quiz_id: parseInt(quizId),
        answers: answers
    };
    
    fetch('/quizzes/' + quizId + '/submit', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify(data)
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(result) {
        document.getElementById('quizContent').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('scoreDisplay').textContent = result.score + ' из ' + result.total_possible;
        document.getElementById('percentageDisplay').textContent = result.percentage;
    })
    .catch(function(error) {
        alert('Ошибка при отправке ответов');
        console.error('Error:', error);
    });
});

loadQuiz();
</script>
{% endblock %}
