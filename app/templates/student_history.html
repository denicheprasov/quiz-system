{% extends "base.html" %}

{% block title %}История тренировок{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">📜 История</h4>
            </div>
            <div class="card-body">
                <div class="mb-3 d-flex justify-content-between">
                    <button class="btn btn-success" onclick="loadHistory()">🔄 Обновить</button>
                    <button class="btn btn-outline-danger" onclick="clearHistory()">🗑 Очистить историю</button>
                </div>
                <div id="historyList">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-arrow-clockwise"></i> Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '<div class="text-center text-muted py-4">⏳ Загрузка...</div>';

    const r = await fetch('/student/api/practice/history', {credentials: 'include'});
    if (!r.ok) { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки истории</div>'; return; }

    const data = await r.json();
    var items = [];

    (data.practice_sessions || []).forEach(function(s) {
        items.push({
            title: s.title || 'Тренировка',
            correct: s.correct_answers || 0,
            total: s.total_tasks || 0,
            date: s.started_at,
            completed: !!s.completed_at,
            badge: s.completed_at ? 'success' : 'warning',
            status: s.completed_at ? '✅ Завершена' : '🔄 В процессе',
        });
    });

    (data.variants || []).forEach(function(v) {
        items.push({
            title: '📋 ' + (v.title || 'Вариант'),
            correct: v.correct_answers || 0,
            total: v.total_tasks || 0,
            date: v.completed_at,
            completed: true,
            badge: 'success',
            status: '✅ Завершен',
        });
    });

    items.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

    if (items.length === 0) {
        container.innerHTML = '<div class="alert alert-info">📭 История пуста</div>';
        return;
    }

    var html = '<div class="list-group">';
    items.forEach(function(item) {
        var percent = item.total > 0 ? Math.round((item.correct / item.total) * 100) : 0;
        html += '<div class="list-group-item"><div class="d-flex justify-content-between align-items-center">';
        html += '<div><strong>' + item.title + '</strong><br><small class="text-muted">' + (item.date ? new Date(item.date).toLocaleString('ru-RU') : '') + '</small></div>';
        html += '<div class="text-end"><span class="badge bg-' + item.badge + '">' + item.status + '</span><br><small>' + item.correct + '/' + item.total + ' (' + percent + '%)</small></div>';
        html += '</div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

loadHistory();

async function clearHistory() {
    if (!confirm('Удалить всю историю тренировок и пройденных вариантов?')) return;
    if (!confirm('Точно уверены? Это действие нельзя отменить.')) return;

    const r = await fetch('/student/api/clear-history', {method: 'DELETE', credentials: 'include'});
    if (r.ok) {
        loadHistory();
    } else {
        alert('Ошибка очистки истории');
    }
}
</script>
{% endblock %}
