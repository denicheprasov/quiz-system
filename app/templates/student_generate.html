{% extends "base.html" %}

{% block title %}Генерация варианта{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">🎲 Сгенерировать вариант</h4>
            </div>
            <div class="card-body">
                <form id="variantForm">
                    <div class="mb-3">
                        <label class="form-label">Название варианта</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        🎲 Сгенерировать вариант
                    </button>
                </form>

                <div id="result" class="mt-4" style="display:none;">
                    <hr>
                    <h5>✅ Вариант сгенерирован</h5>
                    <div id="variantInfo" class="mb-3"></div>
                    <a id="takeLink" href="#" class="btn btn-primary w-100">📋 Перейти к варианту</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('variantForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const response = await fetch('/student/api/generate-variant', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            title: document.getElementById('title').value
        })
    });

    if (!response.ok) {
        alert('Ошибка генерации варианта');
        return;
    }

    const result = await response.json();
    document.getElementById('result').style.display = 'block';
    document.getElementById('takeLink').href = '/student/variant/' + result.id;
});
</script>
{% endblock %}
