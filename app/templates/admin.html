{% extends "base.html" %}

{% block title %}Админ-панель{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">👨‍🏫 Админ-панель</h4>
            </div>
            <div class="card-body">
                <!-- Быстрые действия -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="btn-group w-100" role="group">
                            <a href="/import" class="btn btn-primary">
                                <i class="bi bi-cloud-upload"></i> Импорт заданий
                            </a>
                            <a href="/bank" class="btn btn-info">
                                <i class="bi bi-database"></i> Банк заданий
                            </a>
                            <a href="/variant-builder" class="btn btn-success">
                                <i class="bi bi-plus-circle"></i> Собрать вариант
                            </a>
                            <a href="/variants/create" class="btn btn-warning">
                                <i class="bi bi-pencil"></i> Создать вариант
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Вкладки -->
                <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" id="variants-tab" data-bs-toggle="tab" href="#variants" role="tab">
                            📋 Варианты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="students-tab" data-bs-toggle="tab" href="#students" role="tab">
                            👥 Пользователи
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="groups-tab" data-bs-toggle="tab" href="#groups" role="tab">
                            👥 Группы
                        </a>
                    </li>
                </ul>
                
                <div class="tab-content mt-3" id="adminTabsContent">
                    <!-- Вкладка с вариантами -->
                    <div class="tab-pane fade show active" id="variants" role="tabpanel">
                        <div id="variantsList">
                            <div class="text-center">
                                <div class="spinner-border" role="status"></div>
                                <p>Загрузка...</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Вкладка с пользователями -->
                    <div class="tab-pane fade" id="students" role="tabpanel">
                        <div id="studentsList">
                            <div class="text-center">
                                <div class="spinner-border" role="status"></div>
                                <p>Загрузка...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Вкладка с группами -->
                <div class="tab-pane fade" id="groups" role="tabpanel">
                    <form onsubmit="createAdminGroup(event)" class="row g-2 mb-3">
                        <div class="col-md-8">
                            <input type="text" class="form-control" id="groupNameInput" placeholder="Название группы, например: 11А класс" required>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-success w-100">➕ Создать группу</button>
                        </div>
                    </form>
                    <div id="groupsList">
                        <div class="text-center">
                            <div class="spinner-border" role="status"></div>
                            <p>Загрузка...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для просмотра результатов -->
<div class="modal fade" id="resultsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📊 Результаты</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="resultsContent">
                <div class="text-center">
                    <div class="spinner-border" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Функция загрузки статистики


// Функция загрузки вариантов
function loadVariants() {
    var container = document.getElementById('variantsList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    fetch('/variants/', {credentials: 'include'})
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка загрузки вариантов');
        return response.json();
    })
    .then(function(variants) {
        if (variants.length === 0) {
            container.innerHTML = '<div class="alert alert-info">📭 Нет созданных вариантов</div>';
            return;
        }
        
        var html = '<div class="row">';
        for (var i = 0; i < variants.length; i++) {
            var v = variants[i];
            var tasksCount = v.variant_tasks ? v.variant_tasks.length : 0;
            
            html += '<div class="col-md-4 mb-3">';
            html += '<div class="card h-100">';
            html += '<div class="card-body d-flex flex-column">';
            html += '<h5 class="card-title">' + v.title + '</h5>';
            html += '<p class="card-text flex-grow-1">' + (v.description || 'Описание отсутствует') + '</p>';
            html += '<p class="text-muted small mb-1">Создал: ' + (v.created_by_name || 'Неизвестно') + '</p>';
            html += '<p class="text-muted small mb-2">Заданий: ' + tasksCount + '</p>';
            html += '<div class="d-flex align-items-center gap-2 mt-auto">';
            html += '<span class="badge ' + (v.is_active ? 'bg-success' : 'bg-secondary') + '" style="font-size:0.75rem">' + 
                    (v.is_active ? 'Активен' : 'Неактивен') + '</span>';
            html += '<div class="btn-group flex-fill" role="group">';
            html += '<button class="btn btn-outline-info btn-sm" onclick="viewVariant(' + v.id + ')">👁️</button>';
            html += '<button class="btn btn-outline-danger btn-sm" onclick="deleteVariant(' + v.id + ')">🗑️</button>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки вариантов: ' + error.message + '</div>';
        console.error('Error:', error);
    });
}

// Функция загрузки пользователей
function loadStudents() {
    var container = document.getElementById('studentsList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    fetch('/users', {credentials: 'include'})
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка загрузки пользователей');
        return response.json();
    })
    .then(function(users) {
        if (users.length === 0) {
            container.innerHTML = '<div class="alert alert-info">👤 Нет зарегистрированных пользователей</div>';
            return;
        }
        
        var html = '<div class="table-responsive"><table class="table table-striped">';
        html += '<thead><tr><th>#</th><th>ФИО</th><th>Email</th><th>Роль</th><th>Дата</th><th></th></tr></thead>';
        html += '<tbody>';
        
        for (var i = 0; i < users.length; i++) {
            var u = users[i];
            html += '<tr>';
            html += '<td>' + u.id + '</td>';
            html += '<td>' + (u.display_name || u.username) + '</td>';
            html += '<td>' + u.email + '</td>';
            html += '<td>' + (u.is_teacher ? '<span class="badge bg-primary">Учитель</span>' : '<span class="badge bg-secondary">Ученик</span>') + '</td>';
            html += '<td>' + new Date(u.created_at).toLocaleDateString() + '</td>';
            html += '<td><button class="btn btn-danger btn-sm" onclick="deleteUser(' + u.id + ')">🗑️</button></td>';
            html += '</tr>';
        }
        
        html += '</tbody></table></div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки пользователей: ' + error.message + '</div>';
        console.error('Error:', error);
    });
}

function deleteUser(userId) {
    if (!confirm('Удалить пользователя? Все его данные будут безвозвратно удалены.')) return;
    
    fetch('/users/' + userId, {
        method: 'DELETE',
        credentials: 'include'
    })
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка удаления');
        return response.json();
    })
    .then(function() {
        loadStudents();
    })
    .catch(function(error) {
        alert('Ошибка: ' + error.message);
    });
}

// Просмотр варианта
function viewVariant(variantId) {
    var modal = new bootstrap.Modal(document.getElementById('resultsModal'));
    modal.show();

    var container = document.getElementById('resultsContent');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';

    fetch('/variants/' + variantId, {credentials: 'include'})
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка загрузки');
        return response.json();
    })
    .then(function(variant) {
        var html = '<h5>' + variant.title + '</h5>';
        if (variant.description) html += '<p class="text-muted">' + variant.description + '</p>';
        html += '<div class="mb-3"><select id="assignGroup" class="form-select"><option value="">Выдать группе...</option></select>';
        html += '<div class="mt-1"><label class="small text-muted">Дедлайн (опционально):</label>';
        html += '<input type="date" id="assignDueDate" class="form-control form-control-sm"></div>';
        html += '<button class="btn btn-primary btn-sm mt-1" onclick="assignVariant(' + variant.id + ')">📤 Выдать</button></div>';
        html += '<hr><div class="accordion" id="variantAccordion">';

        if (variant.variant_tasks && variant.variant_tasks.length > 0) {
            variant.variant_tasks.forEach(function(vt) {
                var task = vt.task;
                html += '<div class="accordion-item">';
                html += '<h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#vt' + vt.id + '">';
                html += 'Задание ' + vt.order_number;
                if (task) html += ' — ' + task.text.substring(0, 80) + '...';
                html += '</button></h2>';
                html += '<div id="vt' + vt.id + '" class="accordion-collapse collapse" data-bs-parent="#variantAccordion">';
                html += '<div class="accordion-body">';
                if (task) {
                    html += '<p>' + task.text.replace(/\n/g, '<br>') + '</p>';
                    if (task.image_url) html += '<img src="' + task.image_url + '" class="img-fluid rounded question-image mb-2">';
                    if (task.file_url) html += '<p class="mt-2"><a href="' + task.file_url + '" class="btn btn-outline-primary btn-sm" target="_blank"><i class="bi bi-download"></i> Скачать файл</a></p>';
                    html += '<p><strong>Ответ:</strong> ' + task.correct_answer + '</p>';
                } else {
                    html += '<p class="text-muted">Задание не найдено в банке</p>';
                }
                html += '</div></div></div>';
            });
        } else {
            html += '<p class="text-muted">В варианте нет заданий</p>';
        }

        html += '</div>';
        container.innerHTML = html;

        fetch('/groups/api/list', {credentials: 'include'})
        .then(function(r) { return r.json(); })
        .then(function(groups) {
            var sel = document.getElementById('assignGroup');
            groups.forEach(function(g) {
                var opt = document.createElement('option');
                opt.value = g.id;
                opt.text = g.name + ' (' + g.member_count + ' уч.)';
                sel.appendChild(opt);
            });
        });
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ ' + error.message + '</div>';
    });
}

// Удаление варианта
function deleteVariant(variantId) {
    if (!confirm('Вы уверены, что хотите удалить этот вариант?')) {
        return;
    }
    
    fetch('/variants/' + variantId, {
        method: 'DELETE',
        credentials: 'include'
    })
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка удаления');
        return response.json();
    })
    .then(function(data) {
        alert('Вариант удален!');
        loadVariants();
    })
    .catch(function(error) {
        alert('Ошибка удаления варианта: ' + error.message);
        console.error('Error:', error);
    });
}

// Загрузка групп
function loadGroups() {
    var container = document.getElementById('groupsList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    fetch('/groups/api/list', {credentials: 'include'})
    .then(function(response) {
        if (!response.ok) throw new Error('Ошибка загрузки групп');
        return response.json();
    })
    .then(function(groups) {
        if (groups.length === 0) {
            container.innerHTML = '<div class="alert alert-info">📭 Нет созданных групп</div>';
            return;
        }
        
        var html = '<div class="list-group">';
        for (var i = 0; i < groups.length; i++) {
            var g = groups[i];
            var link = window.location.origin + '/groups/join/' + g.invite_code;
            html += '<div class="list-group-item">';
            html += '<div class="d-flex justify-content-between"><div><strong>' + g.name + '</strong><br><small>Участников: ' + g.member_count + '</small></div>';
            html += '<div><button class="btn btn-sm btn-outline-info" onclick="navigator.clipboard.writeText(\'' + link + '\').then(function(){alert(\'Ссылка скопирована\');})">📋 Копировать ссылку</button>';
            html += ' <button class="btn btn-sm btn-outline-danger" onclick="deleteAdminGroup(' + g.id + ')">🗑</button></div></div>';
            html += '<div class="mt-1"><small class="text-muted">Ссылка: <code>' + link + '</code></small></div>';
            html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки групп: ' + error.message + '</div>';
    });
}

function deleteAdminGroup(id) {
    if (!confirm('Удалить группу?')) return;
    fetch('/groups/' + id, {method: 'DELETE', credentials: 'include'})
    .then(function(r) { if (r.ok) loadGroups(); else alert('Ошибка'); });
}

function assignVariant(variantId) {
    var groupId = document.getElementById('assignGroup').value;
    if (!groupId) { alert('Выберите группу'); return; }
    if (!confirm('Выдать вариант всем участникам группы?')) return;

    var dueDate = document.getElementById('assignDueDate').value;
    var formData = new FormData();
    if (dueDate) formData.append('due_date', dueDate);

    fetch('/variants/' + variantId + '/assign/' + groupId, {
        method: 'POST', credentials: 'include', body: formData
    })
    .then(function(r) {
        if (!r.ok) { return r.json().then(function(d) { throw new Error(d.detail || 'Ошибка'); }); }
        return r.json();
    })
    .then(function(data) {
        location.reload();
    })
    .catch(function(e) { alert(e.message); });
}

function createAdminGroup(e) {
    e.preventDefault();
    var name = document.getElementById('groupNameInput').value;
    if (!name) return;

    var formData = new FormData();
    formData.append('name', name);

    fetch('/groups', {method: 'POST', credentials: 'include', body: formData})
    .then(function(r) {
        if (r.ok) { document.getElementById('groupNameInput').value = ''; loadGroups(); }
        else { alert('Ошибка создания группы'); }
    });
}

// Загружаем все данные
document.addEventListener('DOMContentLoaded', function() {
    loadVariants();
    loadStudents();
    loadGroups();
});
</script>
{% endblock %}
