services:
  - type: web
    name: quiz-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # SUPABASE_URL = postgresql://postgres:password@db.xxxx.supabase.co:5432/postgres
      # ⚠️ Не DATABASE_URL — Render автоматически перезаписывает её своим PostgreSQL
      # Укажи SUPABASE_URL в Dashboard → Environment Variables
      - key: ALLOWED_ORIGINS
        value: https://quiz-system-ps4o.onrender.com
      - key: SECRET_KEY
        value: 78f1fe3547d298be1bff8d69a48f42c31a8ff9c1b334c6063c314f10ef23b813
