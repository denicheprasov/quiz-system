{% extends "base.html" %}

{% block title %}История заданий{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">📜 История заданий</h4>
            </div>
            <div class="card-body">
                <div class="mb-3 d-flex justify-content-between">
                    <button class="btn btn-success" onclick="loadHistory()">🔄 Обновить</button>
                    <button class="btn btn-outline-danger" onclick="clearHistory()">🗑 Очистить историю</button>
                </div>
                <div id="historyList">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-arrow-clockwise"></i> Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '<div class="text-center text-muted py-4">⏳ Загрузка...</div>';

    const r = await fetch('/student/api/task-history', {credentials: 'include'});
    if (!r.ok) { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки истории</div>'; return; }

    const items = await r.json();

    if (items.length === 0) {
        container.innerHTML = '<div class="alert alert-info">📭 История пуста</div>';
        return;
    }

    var html = '<div class="table-responsive"><table class="table table-hover">';
    html += '<thead><tr><th>#</th><th>Задание</th><th>Ваш ответ</th><th>Правильный ответ</th><th>Результат</th><th>Дата</th></tr></thead><tbody>';

    items.forEach(function(item, i) {
        html += '<tr class="' + (item.is_correct ? 'table-success' : 'table-danger') + '">';
        html += '<td>' + (i + 1) + '</td>';
        html += '<td><small>' + (item.text || '') + '</small></td>';
        html += '<td>' + (item.user_answer || '—') + '</td>';
        html += '<td>' + item.correct_answer + '</td>';
        html += '<td>' + (item.is_correct ? '✅' : '❌') + '</td>';
        html += '<td><small>' + (item.date ? new Date(item.date).toLocaleString('ru-RU') : '') + '</small></td>';
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
}

loadHistory();

async function clearHistory() {
    if (!confirm('Удалить всю историю? Это действие нельзя отменить.')) return;
    if (!confirm('Точно уверены?')) return;

    const r = await fetch('/student/api/clear-history', {method: 'DELETE', credentials: 'include'});
    if (r.ok) {
        loadHistory();
    } else {
        alert('Ошибка очистки истории');
    }
}
</script>
{% endblock %}
