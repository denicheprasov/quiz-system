{% extends "base.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">👤 Профиль</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control" value="{{ user.email }}" disabled>
                </div>
                <hr>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="lastName" value="{{ user.last_name or '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" class="form-control" id="firstName" value="{{ user.first_name or '' }}">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Отчество</label>
                        <input type="text" class="form-control" id="patronymic" value="{{ user.patronymic or '' }}">
                    </div>
                </div>
                <button class="btn btn-success w-100" onclick="saveProfile()">💾 Сохранить</button>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
async function saveProfile() {
    const formData = new FormData();
    formData.append('last_name', document.getElementById('lastName').value);
    formData.append('first_name', document.getElementById('firstName').value);
    formData.append('patronymic', document.getElementById('patronymic').value);

    const r = await fetch('/profile/update', {
        method: 'POST',
        credentials: 'include',
        body: formData
    });

    if (r.ok) {
        document.getElementById('message').innerHTML = '<div class="alert alert-success">✅ Сохранено</div>';
        setTimeout(() => location.reload(), 1000);
    } else {
        document.getElementById('message').innerHTML = '<div class="alert alert-danger">❌ Ошибка</div>';
    }
}
</script>
{% endblock %}
