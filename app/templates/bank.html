{% extends "base.html" %}

{% block title %}Банк заданий{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">📚 Банк заданий</h4>
                <div>
                    <a href="/import" class="btn btn-light btn-sm">
                        <i class="bi bi-cloud-upload"></i> Импорт
                    </a>
                    <a href="/variant-builder" class="btn btn-light btn-sm">
                        <i class="bi bi-plus-circle"></i> Собрать вариант
                    </a>
                </div>
            </div>
            <div class="card-body">
                <!-- Фильтры -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Номер задания в КИМ</label>
                        <select class="form-select" id="filterNumber">
                            <option value="">Все номера</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                            <option value="21">21</option>
                            <option value="22">22</option>
                            <option value="23">23</option>
                            <option value="24">24</option>
                            <option value="25">25</option>
                            <option value="26">26</option>
                            <option value="27">27</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Статус</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">Все</option>
                            <option value="verified">✅ Проверенные</option>
                            <option value="unverified">⏳ Не проверенные</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="applyFilters()">
                            <i class="bi bi-search"></i> Применить фильтр
                        </button>
                    </div>
                </div>

                <!-- Статистика -->
                <div class="row mb-3">
                    <div class="col-md-12">
                        <div id="stats" class="d-flex gap-3 flex-wrap">
                            <span class="badge bg-primary">Всего: <span id="totalCount">0</span></span>
                            <span class="badge bg-success">Проверено: <span id="verifiedCount">0</span></span>
                            <span class="badge bg-warning text-dark">Не проверено: <span id="unverifiedCount">0</span></span>
                            <span class="badge bg-info">Номера в банке: <span id="numberCount">0</span></span>
                        </div>
                    </div>
                </div>
                
                <div id="tasksList">
                    <div class="text-center">
                        <div class="spinner-border" role="status"></div>
                        <p>Загрузка заданий...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для просмотра -->
<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">👁️ Просмотр задания</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewContent">
                <div class="text-center"><div class="spinner-border" role="status"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
function loadTasks(filters) {
    var container = document.getElementById('tasksList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    var url = '/bank/tasks?';
    if (filters) {
        if (filters.task_number) url += 'task_number=' + filters.task_number + '&';
        if (filters.is_verified === true) url += 'is_verified=true&';
        if (filters.is_verified === false) url += 'is_verified=false&';
    }
    url += 'limit=1000';
    
    fetch(url, {credentials: 'include'})
    .then(function(response) {
        return response.json();
    })
    .then(function(tasks) {
        var verified = tasks.filter(function(t) { return t.is_verified; }).length;
        var numbers = new Set(tasks.map(function(t) { return t.task_number; }));
        
        document.getElementById('totalCount').textContent = tasks.length;
        document.getElementById('verifiedCount').textContent = verified;
        document.getElementById('unverifiedCount').textContent = tasks.length - verified;
        document.getElementById('numberCount').textContent = numbers.size;
        
        if (tasks.length === 0) {
            container.innerHTML = `
                <div class="alert alert-info">
                    📭 Банк заданий пуст. <a href="/import">Импортируйте</a> задания.
                </div>
            `;
            return;
        }
        
        // Группировка по номерам
        var grouped = {};
        tasks.forEach(function(task) {
            var num = task.task_number;
            if (!grouped[num]) grouped[num] = [];
            grouped[num].push(task);
        });
        
        var html = '<div class="accordion" id="tasksAccordion">';
        var sortedNumbers = Object.keys(grouped).sort(function(a, b) { return parseInt(a) - parseInt(b); });
        
        sortedNumbers.forEach(function(num) {
            var tasksForNumber = grouped[num];
            var count = tasksForNumber.length;
            var verifiedCount = tasksForNumber.filter(function(t) { return t.is_verified; }).length;
            
            html += '<div class="accordion-item">';
            html += '<h2 class="accordion-header">';
            html += '<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse' + num + '">';
            html += 'Задание №' + num + ' (' + count + ' заданий, ' + verifiedCount + ' проверено)';
            html += '</button>';
            html += '</h2>';
            html += '<div id="collapse' + num + '" class="accordion-collapse collapse" data-bs-parent="#tasksAccordion">';
            html += '<div class="accordion-body">';
            
            html += '<div class="table-responsive"><table class="table table-striped table-sm">';
            html += '<thead><tr><th>#</th><th>ID</th><th>Текст</th><th>Ответ</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
            
            tasksForNumber.forEach(function(task) {
                var status = task.is_verified ? 
                    '<span class="badge bg-success">✅ Проверено</span>' : 
                    '<span class="badge bg-warning text-dark">⏳ Не проверено</span>';
                
                html += '<tr>';
                html += '<td>' + task.order_in_file + '</td>';
                html += '<td>' + task.id + '</td>';
                html += '<td>' + task.text.substring(0, 50) + '...</td>';
                html += '<td><strong>' + task.correct_answer + '</strong></td>';
                html += '<td>' + status + '</td>';
                html += '<td>';
                html += '<button class="btn btn-info btn-sm" onclick="viewTask(' + task.id + ')">👁️</button>';
                if (!task.is_verified) {
                    html += '<button class="btn btn-success btn-sm" onclick="verifyTask(' + task.id + ')">✅</button>';
                }
                html += '<button class="btn btn-danger btn-sm" onclick="deleteTask(' + task.id + ')">🗑️</button>';
                html += '</td>';
                html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            html += '</div></div></div>';
        });
        
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки заданий</div>';
        console.error('Error:', error);
    });
}

function applyFilters() {
    var filters = {};
    var number = document.getElementById('filterNumber').value;
    var status = document.getElementById('filterStatus').value;
    
    if (number) filters.task_number = parseInt(number);
    if (status === 'verified') filters.is_verified = true;
    if (status === 'unverified') filters.is_verified = false;
    
    loadTasks(filters);
}

function viewTask(taskId) {
    var modal = new bootstrap.Modal(document.getElementById('viewModal'));
    modal.show();
    
    var container = document.getElementById('viewContent');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';
    
    fetch('/bank/tasks/' + taskId, {credentials: 'include'})
    .then(function(response) {
        return response.json();
    })
    .then(function(task) {
        var html = '<div class="card">';
        html += '<div class="card-body">';
        html += '<h6>Задание №' + task.task_number + ' (ID: ' + task.id + ')</h6>';
        html += '<p><strong>Источник:</strong> ' + (task.source_file || 'Не указан') + '</p>';
        html += '<hr>';
        html += '<p><strong>Текст:</strong></p>';
        html += '<div class="p-2 bg-light">' + task.text.replace(/\n/g, '<br>') + '</div>';
        if (task.image_url) {
            html += '<div class="mt-2"><img src="' + task.image_url + '" class="img-fluid rounded" style="max-height:300px"></div>';
        }
        if (task.table_data) {
            html += '<p class="mt-3"><strong>Таблица:</strong></p>';
            html += '<div class="p-2 bg-light"><pre>' + task.table_data + '</pre></div>';
        }
        html += '<p class="mt-3"><strong>Правильный ответ:</strong> ' + task.correct_answer + '</p>';
        html += '<p><strong>Статус:</strong> ' + (task.is_verified ? '✅ Проверено' : '⏳ Не проверено') + '</p>';
        html += '</div></div>';
        container.innerHTML = html;
    })
    .catch(function(error) {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки</div>';
    });
}

function verifyTask(taskId) {
    if (!confirm('Отметить задание как проверенное?')) return;
    
    fetch('/bank/tasks/' + taskId + '/verify', {
        method: 'POST',
        credentials: 'include'
    })
    .then(function(response) {
        return response.json();
    })
    .then(function() {
        applyFilters();
    })
    .catch(function(error) {
        alert('Ошибка при подтверждении');
        console.error('Error:', error);
    });
}

function deleteTask(taskId) {
    if (!confirm('Удалить задание?')) return;
    
    fetch('/bank/tasks/' + taskId, {
        method: 'DELETE',
        credentials: 'include'
    })
    .then(function(response) {
        return response.json();
    })
    .then(function() {
        applyFilters();
    })
    .catch(function(error) {
        alert('Ошибка при удалении');
        console.error('Error:', error);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    loadTasks();
});
</script>
{% endblock %}
