{% extends "base.html" %}

{% block title %}Банк заданий{% endblock %}

{% block content %}
<style>
.task-card { border: 1px solid var(--bs-border-color); border-radius: 10px; padding: 16px; margin-bottom: 12px; background: var(--bs-card-bg); }
.task-card:hover { border-color: var(--bs-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
</style>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">📚 Банк заданий</h4>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Номер задания в КИМ</label>
                        <select class="form-select" id="filterNumber" onchange="loadTasks()">
                            <option value="">Все номера</option>
                            {% for i in range(1, 28) %}
                            {% if i not in (20, 21) %}
                            <option value="{{ i }}">{% if i == 19 %}Теория игр{% else %}{{ i }}{% endif %}</option>
                            {% endif %}
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Сложность</label>
                        <select class="form-select" id="filterDifficulty" onchange="loadTasks()">
                            <option value="">Все</option>
                            <option value="easy">Изи</option>
                            <option value="medium">База</option>
                            <option value="hard">Хард</option>
                            <option value="impossible">💀 Легче умереть</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Поиск</label>
                        <input type="text" class="form-control" id="searchInput" placeholder="Поиск по тексту...">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadTasks()">
                            <i class="bi bi-search"></i> Найти
                        </button>
                    </div>
                </div>

                <div id="tasksList">
                    <div class="text-center">
                        <div class="spinner-border" role="status"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function loadTasks() {
    const container = document.getElementById('tasksList');
    container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';

    const number = document.getElementById('filterNumber').value;
    const difficulty = document.getElementById('filterDifficulty').value;
    const search = document.getElementById('searchInput').value.toLowerCase();

    let url = '/student/api/bank?limit=9999';
    if (number) url += '&task_number=' + number;
    if (difficulty) url += '&difficulty=' + difficulty;

    fetch(url, {credentials: 'include'})
    .then(response => {
        if (!response.ok) throw new Error('Ошибка загрузки: ' + response.status);
        return response.json();
    })
    .then(tasks => {
        let filtered = tasks;
        if (search) {
            filtered = tasks.filter(t => t.text.toLowerCase().includes(search));
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="alert alert-info">📭 Заданий не найдено</div>';
            return;
        }

        const grouped = {};
        filtered.forEach(task => {
            if (!grouped[task.task_number]) grouped[task.task_number] = [];
            grouped[task.task_number].push(task);
        });

        const diffMap = {easy:'Изи',medium:'База',hard:'Хард',impossible:'💀 Легче умереть'};
        const diffColor = {easy:'success',medium:'warning text-dark',hard:'danger',impossible:'dark'};

        let html = '<div class="accordion" id="tasksAccordion">';
        const sortedNumbers = Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b));

        sortedNumbers.forEach(num => {
            const tasksForNumber = grouped[num];
            html += '<div class="accordion-item">';
            html += '<h2 class="accordion-header">';
            html += '<button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse' + num + '">';
            html += (num == 19 ? 'Теория игр' : 'Задание №' + num) + ' (' + tasksForNumber.length + ' заданий)';
            html += '</button></h2>';
            html += '<div id="collapse' + num + '" class="accordion-collapse collapse" data-bs-parent="#tasksAccordion">';
            html += '<div class="accordion-body">';

            tasksForNumber.forEach(function(task) {
                html += '<div class="task-card">';
                html += '<div class="d-flex justify-content-between align-items-start mb-2">';
                html += '<span class="fw-bold">#' + task.order_in_file + ' (ID: ' + task.id + ')</span>';
                if (task.difficulty && task.difficulty !== 'base') {
                    html += '<span class="diff-badge badge bg-' + diffColor[task.difficulty] + '">' + diffMap[task.difficulty] + '</span>';
                }
                html += '</div>';
                html += '<p class="mb-2">' + task.text.replace(/\n/g, '<br>') + '</p>';
                if (task.image_url) {
                    task.image_url.split('\n').forEach(function(url) {
                        html += '<img src="' + url + '" class="img-fluid rounded question-image mb-2" style="display:block;margin:8px auto;max-width:400px">';
                    });
                }
                if (task.file_url) {
                    task.file_url.split('\n').forEach(function(url) {
                        html += '<p class="mb-1"><a href="' + url + '" class="btn btn-outline-primary btn-sm" target="_blank"><i class="bi bi-download"></i> Скачать файл</a></p>';
                    });
                }
                html += '</div>';
            });

            html += '</div></div></div>';
        });
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(error => {
        container.innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки: ' + error.message + '</div>';
        console.error('Error:', error);
    });
}

document.addEventListener('DOMContentLoaded', loadTasks);
</script>
{% endblock %}
