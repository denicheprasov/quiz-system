{% extends "base.html" %}

{% block title %}Генерация варианта{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">🎲 Сгенерировать вариант</h4>
            </div>
            <div class="card-body">
                <button class="btn btn-success w-100" onclick="generateVariant()">
                    🎲 Сгенерировать вариант
                </button>

                <div id="result" class="mt-4" style="display:none;">
                    <hr>
                    <h5>✅ Вариант сгенерирован</h5>
                    <div id="variantInfo" class="mb-3"></div>
                    <a id="takeLink" href="#" class="btn btn-primary w-100">📋 Перейти к варианту</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateVariant() {
    document.querySelector('.btn-success').disabled = true;
    document.querySelector('.btn-success').innerHTML = '⏳ Генерация...';

    const response = await fetch('/student/api/generate-variant', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({})
    });

    document.querySelector('.btn-success').disabled = false;
    document.querySelector('.btn-success').innerHTML = '🎲 Сгенерировать вариант';

    if (!response.ok) {
        alert('Ошибка генерации варианта');
        return;
    }

    const result = await response.json();
    document.getElementById('result').style.display = 'block';
    document.getElementById('takeLink').href = '/student/variant/' + result.id;
}
</script>
{% endblock %}
