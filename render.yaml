services:
  - type: web
    name: quiz-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # Укажи DATABASE_URL в Dashboard → Environment Variables
      # postgresql://postgres:password@db.xxxx.supabase.co:5432/postgres
      - key: ALLOWED_ORIGINS
        value: https://quiz-system-ps4o.onrender.com
      - key: SECRET_KEY
        value: 78f1fe3547d298be1bff8d69a48f42c31a8ff9c1b334c6063c314f10ef23b813
