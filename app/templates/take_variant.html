{% extends "base.html" %}

{% block title %}Прохождение варианта{% endblock %}

{% block content %}
<style>
.task-card { border: 1px solid var(--bs-border-color); border-radius: var(--card-radius); padding: 20px; margin-bottom: 16px; background: var(--bs-card-bg); transition: border-color 0.3s, box-shadow 0.3s; }
.task-card img { display: block; margin: 12px auto; max-height: 300px; }
.task-card.correct { border-color: #198754; box-shadow: 0 0 0 2px rgba(25,135,84,0.2); }
.task-card.incorrect { border-color: #dc3545; box-shadow: 0 0 0 2px rgba(220,53,69,0.2); }
</style>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header gradient">
                <h4 class="mb-0">📋 Прохождение варианта</h4>
            </div>
            <div class="card-body">
                <div id="variantHeader" class="mb-3"></div>
                <div id="tasks"></div>
                <div id="finalSection" class="d-none mt-3">
                    <hr>
                    <h5>Результаты</h5>
                    <div id="finalResults"></div>
                    <a href="/student/dashboard" class="btn btn-primary mt-2">📊 Личный кабинет</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var allTasksChecked = false;

async function loadVariant() {
    const container = document.getElementById('tasks');
    container.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';

    const r = await fetch('/variants/' + {{ variant_id }}, {credentials: 'include'});
    if (!r.ok) { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки варианта</div>'; return; }

    const variant = await r.json();
    document.getElementById('variantHeader').innerHTML = '<h5>' + variant.title + '</h5>';

    if (!variant.variant_tasks || variant.variant_tasks.length === 0) {
        container.innerHTML = '<div class="alert alert-info">В варианте нет заданий</div>';
        return;
    }

    var html = '';
    variant.variant_tasks.forEach(function(vt) {
        var task = vt.task;
        if (!task) return;
        html += '<div class="task-card" data-id="' + vt.id + '">';
        html += '<h6>Задание ' + vt.order_number + '</h6>';
        html += '<p>' + task.text.replace(/\n/g, '<br>') + '</p>';
        if (task.image_url) html += '<img src="' + task.image_url + '" class="img-fluid rounded question-image">';
        if (task.file_url) html += '<p class="mt-2"><a href="' + task.file_url + '" class="btn btn-outline-primary btn-sm" target="_blank"><i class="bi bi-download"></i> Скачать файл</a></p>';
        html += '<div class="mb-3">';
        html += '<label class="form-label">Ваш ответ:</label>';
        html += '<input type="text" class="form-control answer-input" data-id="' + vt.id + '" data-correct="' + task.correct_answer + '">';
        html += '</div>';
        html += '<div class="result-feedback mt-1"></div>';
        html += '<div class="retry-btn mt-1"></div>';
        html += '</div>';
    });
    html += '<div class="d-flex gap-2 mt-3">';
    html += '<button class="btn btn-success flex-fill" onclick="checkAll()" id="checkBtn">✅ Проверить</button>';
    html += '<button class="btn btn-primary flex-fill d-none" onclick="finalSubmit()" id="finalBtn">📤 Завершить</button>';
    html += '</div>';
    container.innerHTML = html;
}

function checkAll() {
    var inputs = document.querySelectorAll('.answer-input');
    var allCorrect = true;

    inputs.forEach(function(inp) {
        var card = inp.closest('.task-card');
        var feedback = card.querySelector('.result-feedback');
        var retryBtn = card.querySelector('.retry-btn');

        card.classList.remove('correct', 'incorrect');
        function norm(s) { return (s || '').replace(/<br\/>/g, ' ').replace(/\n/g, ' ').match(/-?\d+/g) || []; }
        var userNums = norm(inp.value).sort(function(a,b){return a-b;}).join(',');
        var correctNums = norm(inp.dataset.correct).sort(function(a,b){return a-b;}).join(',');
        var isCorrect = userNums === correctNums;
        card.classList.add(isCorrect ? 'correct' : 'incorrect');

        if (isCorrect) {
            feedback.innerHTML = '<span class="text-success fw-bold">✅ Верно</span>';
            inp.disabled = true;
            retryBtn.innerHTML = '';
        } else {
            feedback.innerHTML = '<span class="text-danger fw-bold">❌ Неверно</span>';
            retryBtn.innerHTML = '<button class="btn btn-sm btn-outline-warning" onclick="retryTask(this)">🔄 Перерешать</button>';
            allCorrect = false;
        }
    });

    if (allCorrect) {
        document.getElementById('finalBtn').classList.remove('d-none');
        document.getElementById('finalBtn').click();
    } else {
        document.getElementById('finalBtn').classList.remove('d-none');
    }
    allTasksChecked = true;
}

function retryTask(btn) {
    var card = btn.closest('.task-card');
    var input = card.querySelector('.answer-input');
    var feedback = card.querySelector('.result-feedback');

    input.disabled = false;
    input.value = '';
    input.focus();
    card.classList.remove('correct', 'incorrect');
    feedback.innerHTML = '';
    btn.remove();
    allTasksChecked = false;
    document.getElementById('finalBtn').classList.add('d-none');
}

async function finalSubmit() {
    var inputs = document.querySelectorAll('.answer-input');
    var answers = {};
    inputs.forEach(function(inp) {
        answers[inp.dataset.id] = inp.value;
    });

    document.getElementById('checkBtn').disabled = true;
    document.getElementById('finalBtn').disabled = true;
    document.getElementById('finalBtn').innerHTML = '⏳ Отправка...';

    const r = await fetch('/student/variant/' + {{ variant_id }} + '/submit', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(answers)
    });

    if (!r.ok) { alert('Ошибка отправки'); return; }

    const data = await r.json();
    var correct = 0, total = 0;

    data.results.forEach(function(res) {
        var card = document.querySelector('.task-card[data-id="' + res.variant_task_id + '"]');
        if (!card) return;
        card.classList.remove('correct', 'incorrect');
        card.classList.add(res.is_correct ? 'correct' : 'incorrect');
        var feedback = card.querySelector('.result-feedback');
        if (res.is_correct) {
            feedback.innerHTML = '<span class="text-success fw-bold">✅ Верно</span>';
            correct++;
        } else {
            feedback.innerHTML = '<span class="text-danger fw-bold">❌ Неверно. Правильный ответ: ' + res.correct_answer + '</span>';
        }
        total++;
        card.querySelector('.retry-btn').innerHTML = '';
    });

    document.getElementById('finalSection').classList.remove('d-none');
    document.getElementById('finalResults').innerHTML = '<div class="alert alert-info fs-5">✅ Верно: ' + data.score + ' из ' + data.total + '</div>';
    document.getElementById('tasks').scrollIntoView({behavior: 'smooth'});

    setTimeout(function() {
        window.location.href = '/student/dashboard';
    }, 2000);
}

loadVariant();
</script>
{% endblock %}
