{% extends "base.html" %}

{% block title %}История тренировок{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">📜 История тренировок</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <button class="btn btn-success" onclick="loadHistory()">
                        🔄 Обновить
                    </button>
                </div>
                <div id="historyList">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-arrow-clockwise"></i> Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '<div class="text-center text-muted py-4">⏳ Загрузка...</div>';

    const response = await fetch('/student/api/practice/history', {
        credentials: 'include'
    });

    if (!response.ok) {
        container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки истории</div>';
        return;
    }

    const sessions = await response.json();

    if (!sessions || sessions.length === 0) {
        container.innerHTML = '<div class="alert alert-info">📭 У вас пока нет тренировок</div>';
        return;
    }

    let html = '<div class="list-group">';
    sessions.forEach(session => {
        const percent = session.total_tasks > 0
            ? Math.round((session.correct_answers / session.total_tasks) * 100)
            : 0;
        const status = session.completed_at ? '✅ Завершена' : '🔄 В процессе';
        html += `
            <div class="list-group-item">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${session.title || 'Тренировка'}</strong>
                        <br>
                        <small class="text-muted">
                            ${session.started_at ? new Date(session.started_at).toLocaleString('ru-RU') : ''}
                        </small>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-${session.completed_at ? 'success' : 'warning'}">${status}</span>
                        <br>
                        <small>${session.correct_answers || 0}/${session.total_tasks || 0} (${percent}%)</small>
                    </div>
                </div>
            </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

loadHistory();
</script>
{% endblock %}
